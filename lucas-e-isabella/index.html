<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Planejamento Financeiro — Andaluz</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --navy:#003354;
  --navy2:#004a78;
  --gold:#C4854D;
  --bg:#f4f5f7;
  --card:#ffffff;
  --text:#1c2b3a;
  --text2:#5b6a7a;
  --border:#e3e6eb;
  --green:#1d9e75;
  --red:#c0392b;
  --font:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;}
a{color:inherit;}
.logo-img{display:block;object-fit:contain;}

/* ---- Login gate ---- */
#login-screen{
  position:fixed;inset:0;background:linear-gradient(160deg,var(--navy) 0%,#001a2c 100%);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;
}
.login-box{background:var(--card);border-radius:12px;padding:40px 36px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35);}
.login-box .logo-img{height:64px;margin:0 auto 14px;}
.login-box h1{font-size:1.3rem;color:var(--navy);margin-bottom:6px;}
.login-box p{color:var(--text2);font-size:.9rem;margin-bottom:22px;}
.login-box input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;font-size:1rem;text-align:center;letter-spacing:2px;margin-bottom:14px;}
.login-box button{width:100%;padding:12px;border:none;border-radius:8px;background:var(--navy);color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .15s;}
.login-box button:hover{background:var(--navy2);}
.login-error{color:var(--red);font-size:.85rem;margin-top:10px;display:none;}

/* ---- Layout ---- */
#dashboard{display:none;}
header.topbar{
  background:var(--navy);color:#fff;padding:18px 32px;
  display:flex;align-items:center;gap:16px;justify-content:space-between;flex-wrap:wrap;
}
header.topbar .brand-block{display:flex;align-items:center;gap:14px;}
header.topbar .logo-img{height:44px;}
header.topbar .brand{font-weight:700;font-size:1.05rem;letter-spacing:.2px;}
header.topbar .subtitle{font-size:.82rem;color:#c7d2e0;margin-top:2px;}
nav.tabs{
  background:#fff;border-bottom:1px solid var(--border);padding:0 24px;
  display:flex;gap:4px;overflow-x:auto;position:sticky;top:0;z-index:10;
}
nav.tabs button{
  border:none;background:transparent;padding:14px 14px;font-size:.82rem;font-weight:600;
  color:var(--text2);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;
  transition:all .15s;
}
nav.tabs button:hover{color:var(--navy);}
nav.tabs button.active{color:var(--navy);border-bottom-color:var(--gold);}

main{max-width:1100px;margin:0 auto;padding:28px 24px 80px;}
section.page{display:none;}
section.page.active{display:block;animation:fade .2s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

h2.section-title{
  background:var(--navy);color:#fff;padding:12px 18px;border-radius:8px;
  font-size:1.05rem;margin-bottom:6px;display:flex;align-items:center;gap:10px;
}
.section-subtitle{color:var(--gold);font-weight:700;font-size:.78rem;text-transform:uppercase;letter-spacing:.6px;margin-bottom:18px;}
h3.subhead{color:var(--navy);font-size:.95rem;text-transform:uppercase;letter-spacing:.4px;margin:26px 0 12px;display:flex;align-items:center;gap:8px;}
h3.subhead::before{content:'';width:8px;height:8px;background:var(--navy);display:inline-block;border-radius:2px;}

.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:760px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}

.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;}
.card.center-chart{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:340px;}
.kpi{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--gold);border-radius:8px;padding:14px 16px;}
.kpi .label{font-size:.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
.kpi .value{font-size:1.25rem;font-weight:700;color:var(--navy);}
.kpi .value.small{font-size:1rem;}
.kpi.centered{text-align:center;border-left:none;border-top:4px solid var(--gold);padding:20px 14px;}
.kpi.centered .label{font-size:.78rem;}
.kpi.centered .value{font-size:1.5rem;}

.callout{background:#eef2f7;border-left:4px solid var(--navy);border-radius:8px;padding:16px 18px;font-style:italic;color:var(--text2);font-size:.92rem;text-align:justify;}
.callout.centered{border-left:none;border-top:4px solid var(--navy);}
.text-block{color:var(--text2);font-size:.9rem;margin-bottom:14px;text-align:justify;}
.text-block.italic{font-style:italic;}
.text-block b{color:var(--navy);}

.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700;}
.badge.ok{background:rgba(29,158,117,.12);color:var(--green);}
.badge.warn{background:rgba(192,57,43,.12);color:var(--red);}

table{width:100%;border-collapse:separate;border-spacing:0;font-size:.88rem;}
table th{text-align:left;background:var(--gold);color:#fff;font-weight:600;padding:9px 12px;font-size:.78rem;text-transform:uppercase;letter-spacing:.3px;height:38px;box-sizing:border-box;vertical-align:middle;line-height:1.2;}
table tr:first-child th:first-child{border-top-left-radius:8px;}
table tr:first-child th:last-child{border-top-right-radius:8px;}
table td{padding:9px 10px;border-bottom:1px solid var(--border);}
table tr:last-child td{border-bottom:none;}
table td.num,table th.num{text-align:center;font-variant-numeric:tabular-nums;}
.scroll-wrap{max-height:280px;overflow-y:auto;border-radius:10px;}
.scroll-wrap table{border:none;}

.chart-wrap{position:relative;height:280px;width:100%;}
.chart-wrap.tall{height:340px;}
.chart-wrap.full{height:320px;width:100%;}
.chart-wrap.centered{max-width:560px;width:100%;margin:0 auto;height:320px;}

.pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:16px 0 22px;}
@media(max-width:760px){.pillars{grid-template-columns:1fr;}}
.pillar-card{background:#eef2f7;border-radius:8px;padding:16px;}
.pillar-card .pillar-title{color:var(--navy);font-weight:700;font-size:.85rem;text-transform:uppercase;margin-bottom:8px;text-align:center;}
.pillar-card p{color:var(--text2);font-size:.82rem;text-align:justify;}

.saldo-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:760px){.saldo-cols{grid-template-columns:1fr;}}
.saldo-cols table{font-size:.82rem;}

.year-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;}
.year-card .year-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.year-card .year-head .year{font-size:1.1rem;font-weight:700;color:var(--navy);}
.year-card .detail-row{display:flex;justify-content:space-between;font-size:.85rem;padding:6px 0;border-bottom:1px dashed var(--border);}
.year-card .detail-row:last-child{border-bottom:none;}
.year-card .detail-label{color:var(--text2);}
.year-card .detail-note{color:var(--text2);font-size:.78rem;font-style:italic;}

.pos{color:var(--green);}
.neg{color:var(--red);}

footer.pagefoot{text-align:center;color:var(--text2);font-size:.78rem;padding:30px 0 10px;}

.cover{
  background:linear-gradient(160deg,var(--navy) 0%,#001a2c 100%);color:#fff;
  border-radius:12px;padding:60px 40px;text-align:center;margin-bottom:20px;
}
.cover .logo-img{height:240px;margin:0 auto 22px;}
.cover h1{font-size:1.8rem;margin-bottom:8px;}
.cover p{color:#c7d2e0;}

.values-list{list-style:none;margin:14px 0;}
.values-list li{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:.88rem;color:var(--text2);}
.values-list .num-badge{background:var(--navy);color:#fff;width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;}
</style>
</head>

/* ============ SHA-256 puro em JS (sem dependência externa) ============ */
function sha256(ascii){
  function rightRotate(v,a){return (v>>>a)|(v<<(32-a));}
  var mathPow=Math.pow, maxWord=mathPow(2,32), lengthProperty='length',
    i,j, result='';
  var words=[], asciiBitLength=ascii[lengthProperty]*8;
  var hash=sha256.h=sha256.h||[];
  var k=sha256.k=sha256.k||[];
  var primeCounter=k[lengthProperty];
  var isComposite={};
  for(var candidate=2; primeCounter<64; candidate++){
    if(!isComposite[candidate]){
      for(i=0;i<313;i+=candidate) isComposite[i]=candidate;
      hash[primeCounter]=(mathPow(candidate,.5)*maxWord)|0;
      k[primeCounter++]=(mathPow(candidate,1/3)*maxWord)|0;
    }
  }
  ascii+='\x80';
  while(ascii[lengthProperty]%64-56) ascii+='\x00';
  for(i=0;i<ascii[lengthProperty];i++){
    j=ascii.charCodeAt(i);
    if(j>>8) return;
    words[i>>2]|=j<<((3-i)%4)*8;
  }
  words[words[lengthProperty]]=((asciiBitLength/maxWord)|0);
  words[words[lengthProperty]]=(asciiBitLength);
  for(j=0;j<words[lengthProperty];){
    var w=words.slice(j,j+=16);
    var oldHash=hash;
    hash=hash.slice(0,8);
    for(i=0;i<64;i++){
      var w15=w[i-15], w2=w[i-2];
      var a=hash[0], e=hash[4];
      var temp1=hash[7]+(rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]+(w[i]=(i<16)?w[i]:(w[i-16]+(rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3))+w[i-7]+(rightRotate(w2,17)^rightRotate(w2,19)^(w2>>>10)))|0);
      var temp2=(rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(temp1+temp2)|0].concat(hash);
      hash[4]=(hash[4]+temp1)|0;
    }
    for(i=0;i<8;i++){
      hash[i]=(hash[i]+oldHash[i])|0;
    }
  }
  for(i=0;i<8;i++){
    for(j=3;j+1;j--){
      var b=(hash[i]>>(j*8))&255;
      result+=((b<16)?'0':'')+b.toString(16);
    }
  }
  return result;
}

/* ============ Login ============ */
function checkPassword(){
  const input = document.getElementById('senha-input').value.trim();
  const hash = sha256(input);
  if(hash === DATA.cliente.senha_hash){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    initDashboard();
  } else {
    document.getElementById('senha-erro').style.display='block';
  }
}

function navigate(id){
  document.querySelectorAll('section.page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildTabs(){
  const nav = document.getElementById('tabs');
  nav.innerHTML = PAGES.map(p=>`<button id="tab-${p.id}" onclick="navigate('${p.id}')">${p.label}</button>`).join('');
}

function sectionTitle(numero, titulo, subtitulo){
  return `<h2 class="section-title">${numero ? numero+'. ' : ''}${titulo}</h2>${subtitulo ? `<div class="section-subtitle">${subtitulo}</div>` : ''}`;
}

function initDashboard(){
  const logoSrc = DATA.cliente.logo_uri || '';
  document.getElementById('login-logo').src = logoSrc;
  document.getElementById('hdr-logo').src = logoSrc;
  document.getElementById('hdr-cliente').textContent = 'Clientes: ' + DATA.cliente.nome_relatorio;
  document.getElementById('hdr-data').textContent = new Date().toLocaleDateString('pt-BR',{year:'numeric',month:'long'});
  buildTabs();
  document.getElementById('main').innerHTML = PAGES.map(p=>`<section class="page" id="page-${p.id}"></section>`).join('');

  renderCapa();
  renderSituacaoAtual();
  renderSituacaoDesejada();
  renderCenarioProposto();
  renderSobras();
  renderGestaoRiscos();
  renderInvestimentos();
  renderPrevidencia();
  renderConsideracoes();
  renderServicos();

  navigate('capa');
}

function renderCenarioProposto(){
  const d = DATA.cenario_proposto;

  // corta a série no último ano com saldo positivo
  const serieCompleta = d.serie_patrimonio_idade;
  let ultimoPositivo = serieCompleta.length - 1;
  for(let i=0;i<serieCompleta.length;i++){

  }
  const serie = serieCompleta.slice(0, ultimoPositivo+1);

  document.getElementById('page-cenario-proposto').innerHTML = `
    ${sectionTitle(3,'Cenário Proposto')}

      </div>

    <div class="card" style="padding:12px;">
      <div class="chart-wrap full"><canvas id="chart-acumulacao"></canvas></div>
    </div>

    <h3 class="subhead">Projeção de Patrimônio × Idade</h3>
    <div class="card" style="padding:12px;">
      <div class="chart-wrap full"><canvas id="chart-patrimonio-idade"></canvas></div>
    </div>

    <h3 class="subhead">Saldo do Patrimônio a partir da Independência Financeira</h3>
    <div class="card">
      <div class="saldo-cols" id="saldo-cols"></div>
    </div>
  `;
  new Chart(document.getElementById('chart-patrimonio-idade'), {
    type:'line',
    data:{
      labels: serie.map(s=>s.idade),
      datasets:[{
        label:'Saldo projetado',
        data: serie.map(s=>s.saldo),
        borderColor: NAVY, backgroundColor:'rgba(0,51,84,.08)', fill:true, tension:.25, pointRadius:0, borderWidth:2
      }]
    },
    options:{
      maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>fmtBRL(c.parsed.y)}}},
      scales:{ x:{title:{display:true,text:'Idade'}}, y:{ticks:{callback:v=>fmtBRL(v)}} }
    }
  });

  // tabela de saldo segmentada em colunas lado a lado (limitada ao espaço do card)
  const NUM_COLS = 3;
  const MAX_LINHAS_POR_COL = 12;
  const serieVisivel = serie.slice(0, NUM_COLS * MAX_LINHAS_POR_COL);
  const porColuna = Math.ceil(serieVisivel.length / NUM_COLS);
  const colunas = [];
  for(let i=0;i<NUM_COLS;i++){
    colunas.push(serieVisivel.slice(i*porColuna, (i+1)*porColuna));

  document.getElementById('saldo-cols').innerHTML = colunas.filter(c=>c.length).map(col=>`
    <table>
      <tr><th>Idade</th><th class="num">Saldo</th></tr>
      ${col.map(s=>`<tr><td>${s.idade}</td><td class="num">${fmtBRL(s.saldo)}</td></tr>`).join('')}
    </table>
  `).join('');

  // gráfico de área "Acumulação de Patrimônio" (Patrimônio + Saldo Previdência + Objetivos)
  const acumul = d.acumulacao_patrimonio || [];
  new Chart(document.getElementById('chart-acumulacao'), {
    data:{
      labels: acumul.map(a=>a.ano),
      datasets:[
        {type:'line', label:'Patrimônio', data: acumul.map(a=>a.patrimonio), borderColor: NAVY, backgroundColor:'rgba(0,51,84,.55)', fill:'origin', tension:.15, pointRadius:0, borderWidth:1.5, order:2},

      ]
    },
    options:{
      maintainAspectRatio:false,
      plugins:{legend:{position:'bottom'}, tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmtBRL(c.parsed.y)}`}}},
      scales:{ x:{title:{display:true,text:'Ano'}}, y:{ticks:{callback:v=>fmtBRL(v)}} }
    }
  });
}

        <tr><th colspan="2">Tabela Regressiva</th></tr>
        <tr><th>Prazo</th><th class="num">Alíquota</th></tr>
        ${s.tabelaRegressiva.map(t=>`<tr><td>${t.prazo}</td><td class="num">${t.aliquota}</td></tr>`).join('')}
      </table>
      <table class="card">
        <tr><th colspan="2">Tabela Progressiva</th></tr>
        <tr><th>Valor</th><th class="num">Alíquota</th></tr>
        ${s.tabelaProgressiva.map(t=>`<tr><td>${t.faixa}</td><td class="num">${t.aliquota}</td></tr>`).join('')}
      </table>
    </div>
  `;
  new Chart(document.getElementById('chart-previdencia'), {
    type:'line',
    data:{
      labels: curva.map((c,i)=>i),
      datasets:[
        {label:'Previdência', data: curva.map(c=>c.previdencia), borderColor: GOLD, borderWidth:2, pointRadius:0, tension:.2},
        {label:'Fundo Tradicional', data: curva.map(c=>c.fundo_tradicional), borderColor: SLATE, borderWidth:2, pointRadius:0, tension:.2, borderDash:[4,3]},
      ]
    },
    options:{ maintainAspectRatio:false, scales:{ x:{display:false}, y:{display:false} } }
  });
}

/* ============ Página: Considerações Finais ============ */
function renderConsideracoes(){
  const d = DATA.consideracoes_finais;
  const s = STATIC.consideracoesFinais;
  function tbl(title, rows){
    return `<table class="card">
      <tr><th colspan="2">${title}</th></tr>
      ${rows.map(r=>`<tr><td>${r.ano}</td><td class="num">${fmtBRL(r.valor)}</td></tr>`).join('')}
    </table>`;
  }
  document.getElementById('page-consideracoes').innerHTML = `
    <h2 class="section-title">Considerações Finais</h2>
    <p class="text-block">${s.intro}</p>
    <div class="grid grid-3">
      ${tbl('Aporte Mensal', d.aporte_mensal)}
      ${tbl('Aporte Anual', d.aporte_anual)}
      ${tbl('Aporte Mensal Previdência', d.aporte_previdencia)}
    </div>
    <div class="grid grid-2" style="margin-top:16px;">
      ${tbl('Aporte Anual Seguro de Vida', d.aporte_seguro_anual)}
      ${tbl('Meta Patrimônio Financeiro', d.meta_patrimonio)}
    </div>
    <div class="callout" style="margin-top:22px;">${s.lembrete}</div>
    <p class="text-block italic" style="text-align:center;margin-top:18px;color:var(--navy);font-weight:600;">${s.fechamento}</p>
  `;
}

/* ============ Página: Serviços Complementares ============ */
function renderServicos(){
  const s = STATIC.servicos;
  document.getElementById('page-servicos').innerHTML = `
    <h2 class="section-title">Serviços Complementares</h2>
    <p class="text-block">${s.intro}</p>
    <div class="grid grid-2">
      ${s.itens.map(it=>`
        <div class="card">
          <div style="color:var(--navy);font-weight:700;font-size:.92rem;margin-bottom:6px;">${it.titulo}</div>
          <p style="color:var(--text2);font-size:.85rem;text-align:justify;">${it.texto}</p>
        </div>
      `).join('')}
    </div>
  `;
}
